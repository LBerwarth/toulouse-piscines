name: Vérifier les fermetures de piscines

# Appelle l'endpoint qui scrute les pages de la mairie, alimente le cache
# partagé servi aux visiteurs et envoie une notification push quand une
# fermeture exceptionnelle apparaît.
#
# Déclenchement MANUEL uniquement : la planification vit côté Supabase
# (pg_cron + pg_net, cf. db/cron_scrape.sql). Les `schedule` GitHub Actions
# sont « best effort » — ~85 % des ticks quart d'heure étaient silencieusement
# ignorés (6 à 12 passages/jour au lieu de 61), notifications en retard de 1 à 3 h.

on:
  workflow_dispatch: {} # déclenchement manuel possible

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler l'endpoint cron
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://toulouse-piscines.vercel.app/api/cron/check-closures)
          echo "HTTP $code"
          cat /tmp/out.json
          test "$code" = "200"
