name: Vérifier les fermetures de piscines

# Appelle l'endpoint qui scrute les pages de la mairie, alimente le cache
# partagé servi aux visiteurs et envoie une notification push quand une
# fermeture exceptionnelle apparaît.
# (Cron externe via GitHub Actions : pas soumis aux limites de fréquence
#  des cron Vercel du plan Hobby ; gratuit, le dépôt étant public.)

on:
  schedule:
    # Heures en UTC (Toulouse = UTC+1/+2, plages calées sur l'heure d'été).
    # Tous les quarts d'heure en journée (~7 h – 19 h à Toulouse) : la mairie
    # publie aux heures de bureau, inutile de scruter plus tôt ou plus tard.
    # RIEN le soir ni la nuit : la page sert le cache jusqu'à 13 h d'âge
    # (cf. lib/status.ts) sans rescanner.
    - cron: "7,22,37,52 5-16 * * *"
    - cron: "7 17 * * *" # dernier passage (~19 h 07 à Toulouse l'été)
  workflow_dispatch: {} # déclenchement manuel possible

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler l'endpoint cron
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://toulouse-piscines.vercel.app/api/cron/check-closures)
          echo "HTTP $code"
          cat /tmp/out.json
          test "$code" = "200"
